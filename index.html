<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мафия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .btn { background: #e50914; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn-sec { background: #333; }
        input { width: 90%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 16px; }
        .screen { display: none; }
        .active { display: block; }
        .player-list { margin-top: 20px; text-align: left; background: #222; padding: 15px; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h2>🕵️‍♂️ МАФИЯ ОНЛАЙН</h2>
        <p id="user-name">Загрузка профиля...</p>
        <button class="btn" onclick="createRoom()">Создать комнату</button>
        <input type="text" id="room-code-input" placeholder="Введите 4-значный код" inputmode="numeric">
        <button class="btn btn-sec" onclick="joinRoom()">Войти в комнату</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>Комната <span id="lobby-code" style="color: #e50914;">XXXX</span></h2>
        <p>Ожидание игроков...</p>
        <div class="player-list">
            <h3>Игроки в лобби:</h3>
            <div id="players-container"></div>
        </div>
        <button class="btn" style="background: #28a745;" onclick="startGame()">Старт игры</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let playerName = "Игрок_" + Math.floor(Math.random() * 100);
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            playerName = tg.initDataUnsafe.user.first_name;
        }
        document.getElementById('user-name').innerText = `Привет, ${playerName}!`;

        let ws;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Генерируем код комнаты прямо на клиенте, убирая лишние запросы к API
        function createRoom() {
            const generatedCode = String(Math.floor(1000 + Math.random() * 9000));
            connectToRoom(generatedCode);
        }

        function joinRoom() {
            const code = document.getElementById('room-code-input').value.trim();
            if (!code) return alert("Введите код!");
            connectToRoom(code);
        }

        function connectToRoom(code) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${code}/${playerName}`;

            if (ws) { 
                try { ws.close(); } catch(e) {} 
            }

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('lobby-code').innerText = code;
                showScreen('screen-lobby');
            };

            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    
                    if (message.action === 'update_players') {
                        const container = document.getElementById('players-container');
                        container.innerHTML = '';
                        message.players.forEach(name => {
                            container.innerHTML += `<p>• ${name}</p>`;
                        });
                    }

                    if (message.action === 'game_started') {
                        document.getElementById('screen-lobby').innerHTML = `
                            <h2>🎲 ИГРА НАЧАЛАСЬ!</h2>
                            <div style="background: #222; padding: 30px; border-radius: 8px; margin-top: 20px;">
                                <p style="font-size: 18px;">Твоя тайная роль:</p>
                                <h1 style="color: #e50914; font-size: 36px;">${message.role}</h1>
                            </div>
                            <p style="margin-top: 20px; color: #aaa;">Наступает ночь...</p>
                        `;
                    }

                    if (message.action === 'error') {
                        alert(message.message);
                    }
                } catch (e) {
                    console.log("Ошибка парсинга:", e);
                }
            };

            ws.onerror = (error) => {
                console.error("Ошибка сокета:", error);
            };

            ws.onclose = () => {
                // Если произошел сброс, плавно пытаемся восстановить соединение через 3 секунды
                setTimeout(() => {
                    if (document.getElementById('screen-lobby').classList.contains('active')) {
                        connectToRoom(code);
                    }
                }, 3000);
            };
        }

        function startGame() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const currentCode = document.getElementById('lobby-code').innerText;
                ws.send(JSON.stringify({
                    action: "start_game",
                    room_code: currentCode
                }));
            }
        }
    </script>
</body>
</html>
